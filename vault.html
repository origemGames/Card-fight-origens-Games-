<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Cofre – Card Fight</title>
<link rel="stylesheet" href="game.css"/>
<style>
.vault-stats-bar {
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;
  margin-bottom:14px;
}
.vault-stat-box {
  background:#0e0e1c; border:1px solid #1e1e30; border-radius:10px;
  padding:10px; text-align:center;
}
.vault-stat-box .val { font-size:18px; font-weight:900; }
.vault-stat-box .lbl { font-size:10px; color:#9e9e9e; margin-top:2px; }
.vault-cap-bar { background:#1e1e30; border-radius:20px; height:8px; overflow:hidden; margin:8px 0 12px; }
.vault-cap-fill { height:100%; border-radius:20px; background:linear-gradient(90deg,#1565c0,#42a5f5); transition:width 0.5s; }
.vault-cap-fill.warning { background:linear-gradient(90deg,#e65100,#ff9800); }
.vault-cap-fill.full    { background:linear-gradient(90deg,#b71c1c,#ef5350); }
.filter-bar {
  display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; align-items:center;
}
.filter-chip {
  padding:5px 12px; border-radius:20px; border:1px solid #2a2a4a;
  background:transparent; color:#9e9e9e; font-size:11px; font-weight:700;
  cursor:pointer; transition:all 0.2s; font-family:'Rajdhani',sans-serif;
}
.filter-chip.active { background:#c62828; border-color:#ff4444; color:#fff; }
.sort-select {
  background:#0e0e1c; border:1px solid #2a2a4a; border-radius:8px;
  color:#fff; padding:5px 10px; font-family:'Rajdhani',sans-serif;
  font-size:11px; flex:1; min-width:120px;
}
.vault-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; }
.vault-card {
  background:var(--bg-card); border:2px solid var(--rarity-color,#2a2a4a);
  border-radius:9px; padding:8px 4px; text-align:center;
  cursor:pointer; transition:all 0.18s; position:relative; overflow:hidden;
}
.vault-card::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,0.03) 0%,transparent 60%);
  pointer-events:none;
}
.vault-card:hover  { transform:translateY(-3px) scale(1.03); z-index:2; }
.vault-card:active { transform:scale(0.93); }
.vault-card .vc-em { font-size:22px; }
.vault-card .vc-nm { font-size:9px; font-weight:700; margin-top:3px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.vault-card .vc-at { font-size:10px; color:#ffc107; margin-top:2px; }
.vault-card .vc-stars { font-size:9px; color:#ffd700; letter-spacing:0px; min-height:12px; }
.vault-card .vc-cnt{ position:absolute; top:3px; right:4px; font-size:9px; font-weight:900;
  background:#0e0e1c; border-radius:20px; padding:1px 4px; color:#9e9e9e; }
.empty-vault {
  text-align:center; padding:40px 20px; color:#555;
}
.deck-section { margin-top:16px; }
.deck-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; margin-top:8px; }
.deck-slot {
  aspect-ratio:0.72; background:#0e0e1c; border:2px dashed #2a2a4a;
  border-radius:9px; display:flex; align-items:center; justify-content:center;
  font-size:20px; color:#333; cursor:pointer; transition:all 0.2s;
}
.deck-slot.filled { border-style:solid; }
.deck-slot:hover { border-color:#ffc107; color:#ffc107; }
/* Detail modal */
.card-detail-hero { text-align:center; padding:20px 0 12px; }
.card-detail-emoji { font-size:64px; animation:float 2s ease-in-out infinite;
  filter:drop-shadow(0 0 16px rgba(255,193,7,0.3)); }
.card-detail-stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:12px 0; }
.card-stat-box { background:#0e0e1c; border-radius:10px; padding:10px; text-align:center; }
</style>
</head>
<body>
<div class="page" id="app">

<header class="top-bar">
  <a href="index.html" class="btn btn-outline btn-sm">← Voltar</a>
  <span class="logo-title">📦 COFRE</span>
  <span class="gold-badge">🪙 <span id="hdr-gold">0</span></span>
</header>

<main class="content">

  <!-- Estatísticas do cofre -->
  <div class="vault-stats-bar">
    <div class="vault-stat-box">
      <div class="val" style="color:#2196F3;" id="vault-count">0</div>
      <div class="lbl">🃏 Cartas</div>
    </div>
    <div class="vault-stat-box">
      <div class="val" style="color:#ffc107;" id="vault-limit">50</div>
      <div class="lbl">📏 Limite</div>
    </div>
    <div class="vault-stat-box">
      <div class="val" style="color:#66bb6a;" id="vault-free">50</div>
      <div class="lbl">🆓 Livre</div>
    </div>
  </div>

  <!-- Barra de capacidade -->
  <div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:#9e9e9e;margin-bottom:3px;">
      <span>Capacidade do Cofre</span>
      <span id="vault-pct">0%</span>
    </div>
    <div class="vault-cap-bar">
      <div class="vault-cap-fill" id="vault-cap-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Ação rápida: comprar espaço -->
  <div style="display:flex;gap:8px;margin-bottom:14px;">
    <a href="shop.html" class="btn btn-gold btn-sm" style="flex:1;">🛒 Abrir Pacotes</a>
    <a href="shop.html?tab=vault" class="btn btn-outline btn-sm" style="flex:1;">📦+ Expandir</a>
  </div>
  
  <a href="indexcartas.html" class="btn btn-outline btn-block" style="margin-bottom:14px;">
  📖 Ver Índice de Cartas
</a>

  <!-- Filtros -->
  <div class="filter-bar">
    <button class="filter-chip active" onclick="setFilter('ALL',this)">Todos</button>
    <button class="filter-chip" onclick="setFilter('COMMON',this)">Comum</button>
    <button class="filter-chip" onclick="setFilter('RARE',this)">Raro</button>
    <button class="filter-chip" onclick="setFilter('EPIC',this)">Épico</button>
    <button class="filter-chip" onclick="setFilter('LEGENDARY',this)">Lend.</button>
    <button class="filter-chip" onclick="setFilter('MYTHIC',this)" style="color:#f44336;">Mítico</button>
    <select class="sort-select" id="sort-select" onchange="applySortRender()">
      <option value="rarity">Raridade</option>
      <option value="atk">Ataque</option>
      <option value="name">Nome</option>
      <option value="count">Quantidade</option>
    </select>
  </div>

  <!-- Grade de cartas -->
  <div id="vault-grid-wrapper">
    <div class="vault-grid" id="vault-grid"></div>
    <div class="empty-vault" id="empty-msg" style="display:none;">
      <div style="font-size:48px;margin-bottom:12px;">📭</div>
      <div style="font-size:14px;margin-bottom:6px;">Cofre Vazio</div>
      <div style="font-size:12px;">Abra pacotes na Loja para obter cartas!</div>
      <a href="shop.html" class="btn btn-primary" style="margin-top:12px;display:inline-block;">
        🛒 Ir à Loja
      </a>
    </div>
  </div>

  <!-- Estatísticas por raridade -->
  <div class="deck-section">
    <div style="font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:#ffc107;margin-bottom:10px;">
      📊 Por Raridade
    </div>
    <div id="rarity-stats"></div>
  </div>

  <div style="height:80px;"></div>
</main>

<!-- Modal detalhe da carta -->
<div class="modal-overlay hidden" id="card-modal">
  <div class="modal-box">
    <div class="card-detail-hero">
      <div class="card-detail-emoji" id="detail-emoji">⚔️</div>
      <div style="font-family:'Cinzel',serif;font-size:18px;font-weight:900;margin:8px 0 4px;" id="detail-name">–</div>
      <div style="font-size:13px;font-weight:700;" id="detail-rarity">–</div>
    </div>

    <div class="card-detail-stats">
      <div class="card-stat-box">
        <div style="font-size:28px;font-weight:900;color:#ffc107;" id="detail-atk">0</div>
        <div style="font-size:11px;color:#9e9e9e;">⚔️ Ataque</div>
      </div>
      <div class="card-stat-box">
        <div style="font-size:28px;font-weight:900;color:#66bb6a;" id="detail-hp">0</div>
        <div style="font-size:11px;color:#9e9e9e;">❤️ HP</div>
      </div>
    </div>

    <div style="background:#0e0e1c;border-radius:10px;padding:12px;margin-bottom:12px;">
      <div style="font-size:12px;color:#c0c0d0;line-height:1.7;" id="detail-desc">–</div>
    </div>

    <div style="font-size:12px;color:#9e9e9e;text-align:center;margin-bottom:12px;" id="detail-count"></div>

    <button class="btn btn-outline btn-block" onclick="closeModal()">Fechar</button>
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html"  class="nav-btn"><span class="icon">🏠</span>Início</a>
  <a href="battle.html" class="nav-btn"><span class="icon">⚔️</span>Batalha</a>
  <a href="vault.html"  class="nav-btn active"><span class="icon">📦</span>Cofre</a>
  <a href="shop.html"   class="nav-btn"><span class="icon">🛒</span>Loja</a>
  <a href="about.html"  class="nav-btn"><span class="icon">ℹ️</span>Sobre</a>
</nav>
<div id="toast-container"></div>
</div>

<script src="gamedata.js"></script>
<script src="gamedata2.js"></script>
<script src="gamedata3.js"></script>
<script src="gamedata-v7-patch.js"></script>
<script src="gamedata-pesca.js"></script>
<script src="gamedata-pesca-patch.js"></script>
<script src="gamedata-maestria-patch.js"></script>
<script src="gamedata-prime-patch.js"></script>
<script src="gamedata-sabio-patch.js"></script>
<script src="gamedata-aventuras-patch.js"></script>
<script src="gamedata-vendedor-patch.js"></script>
<script>
let save, currentFilter = "ALL";

function init() {
  save = getOrCreateSave();
  updateCapacityBar();
  applySortRender();
  renderRarityStats();
  updateHeader();
  startAutoSave(() => save);
}

function updateCapacityBar() {
  const count = save.vault.length;
  const limit = save.vaultLimit;
  const free  = Math.max(0, limit - count);
  const pct   = Math.min(100, Math.round((count / limit) * 100));

  document.getElementById("vault-count").textContent = count;
  document.getElementById("vault-limit").textContent = limit;
  document.getElementById("vault-free").textContent  = free;
  document.getElementById("vault-pct").textContent   = pct + "%";

  const fill = document.getElementById("vault-cap-fill");
  fill.style.width = pct + "%";
  fill.className = `vault-cap-fill${pct >= 95 ? " full" : pct >= 75 ? " warning" : ""}`;
}

function setFilter(rarity, btn) {
  currentFilter = rarity;
  document.querySelectorAll(".filter-chip").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  applySortRender();
}

function applySortRender() {
  const sortKey = document.getElementById("sort-select").value;

  // Agregar: { cardId → count }
  const counts = {};
  save.vault.forEach(id => { counts[id] = (counts[id]||0) + 1; });

  // Resolve cartas únicas
  let unique = Object.keys(counts).map(id => ({ card:getCardById(id), count:counts[id] }))
    .filter(x => x.card != null);

  if (currentFilter !== "ALL") {
    unique = unique.filter(x => x.card.rarity === currentFilter);
  }

  // Ordenação
  const rarOrder = ["ORIGENS","ULTRA_RARE","MYTHIC","LEGENDARY","EPIC","RARE","COMMON"];
  if (sortKey === "rarity") {
    unique.sort((a,b) => rarOrder.indexOf(a.card.rarity) - rarOrder.indexOf(b.card.rarity));
  } else if (sortKey === "atk") {
    unique.sort((a,b) => b.card.atk - a.card.atk);
  } else if (sortKey === "name") {
    unique.sort((a,b) => a.card.name.localeCompare(b.card.name));
  } else if (sortKey === "count") {
    unique.sort((a,b) => b.count - a.count);
  }

  const grid   = document.getElementById("vault-grid");
  const emptyM = document.getElementById("empty-msg");

  if (unique.length === 0) {
    grid.innerHTML = "";
    emptyM.style.display = "block";
    return;
  }
  emptyM.style.display = "none";

  grid.innerHTML = unique.map(({ card, count }) => {
    const r = RARITY[card.rarity] || RARITY.COMMON;
    const mPts  = (save.maestria && save.maestria[card.id]) ? save.maestria[card.id].pts : 0;
    const mStars = (typeof getMaestriaStars === "function" && mPts > 0)
      ? getMaestriaStars(mPts, card.rarity) : 0;
    const starStr = mStars > 0 ? "★".repeat(mStars) : "";
    const infused = (save.maestria && save.maestria[card.id] && save.maestria[card.id].infused);
    const borderOverride = mStars === 5
      ? "border-color:#ce93d8;box-shadow:0 0 8px rgba(206,147,216,0.4);"
      : mStars === 4 ? "border-color:#00e5ff33;" 
      : mStars === 3 ? "border-color:#ffd70033;"
      : mStars === 2 ? "border-color:#aaaaaa33;"
      : mStars === 1 ? "border-color:#cd7f3233;" : "";
    return `<div class="vault-card" style="--rarity-color:${r.color}33;${borderOverride}" onclick="showCard('${card.id}',${count})">
      ${count > 1 ? `<div class="vc-cnt">x${count}</div>` : ""}
      ${infused ? '<div style="position:absolute;top:3px;left:4px;font-size:9px;">💎</div>' : ""}
      <div class="vc-em">${card.img}</div>
      <div class="vc-nm">${card.name}</div>
      <div class="vc-at">⚔️${card.atk}</div>
      <div class="vc-stars">${starStr}</div>
    </div>`;
  }).join("");
}

function renderRarityStats() {
  const counts = {};
  save.vault.forEach(id => {
    const card = getCardById(id);
    if (!card) return;
    counts[card.rarity] = (counts[card.rarity]||0) + 1;
  });

  const order = ["ORIGENS","ULTRA_RARE","MYTHIC","LEGENDARY","EPIC","RARE","COMMON"];
  const container = document.getElementById("rarity-stats");
  container.innerHTML = order.map(rar => {
    const info = RARITY[rar];
    const n    = counts[rar] || 0;
    if (n === 0) return "";
    const pct = save.vault.length ? Math.round((n/save.vault.length)*100) : 0;
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
      <div style="font-size:11px;font-weight:700;color:${info.color};min-width:80px;">${info.name}</div>
      <div style="flex:1;background:#1e1e30;border-radius:20px;height:6px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:${info.color};border-radius:20px;"></div>
      </div>
      <div style="font-size:11px;color:#9e9e9e;min-width:30px;text-align:right;">${n}</div>
    </div>`;
  }).join("");
}

function showCard(cardId, count) {
  const card = getCardById(cardId);
  if (!card) return;
  const r = RARITY[card.rarity] || RARITY.COMMON;
  document.getElementById("detail-emoji").textContent  = card.img;
  document.getElementById("detail-name").textContent   = card.name;
  document.getElementById("detail-rarity").textContent = r.name;
  document.getElementById("detail-rarity").style.color = r.color;
  document.getElementById("detail-atk").textContent    = card.atk;
  document.getElementById("detail-hp").textContent     = card.hp;
  document.getElementById("detail-desc").textContent   = card.desc;
  document.getElementById("detail-count").textContent  = `Você possui ${count} cópia(s) desta carta`;

  // Maestria no modal
  const mPts  = (save.maestria && save.maestria[cardId]) ? save.maestria[cardId].pts : 0;
  const mStars = (typeof getMaestriaStars === "function" && mPts > 0) ? getMaestriaStars(mPts, card.rarity) : 0;
  let mEl = document.getElementById("detail-maestria");
  if (!mEl) {
    mEl = document.createElement("div");
    mEl.id = "detail-maestria";
    mEl.style.cssText = "margin-top:8px;padding:7px 10px;background:#0e0e1c;border-radius:8px;font-size:12px;";
    document.getElementById("detail-count").after(mEl);
  }
  const starFull = "★".repeat(mStars);
  const starEmpty = "☆".repeat(5 - mStars);
  mEl.innerHTML = `<span style="color:#ce93d8;font-weight:700;">⭐ Maestria:</span> <span style="color:#ffd700;">${starFull}</span><span style="color:#444;">${starEmpty}</span>
    <span style="color:#9e9e9e;margin-left:6px;font-size:11px;">${mPts} pts${mStars > 0 ? " · +" + mStars + "% ATK/HP" : ""}</span>
    <a href="maestria.html" style="display:block;margin-top:5px;font-size:11px;color:#7c4dff;text-decoration:none;">Ver Maestria completa →</a>`;

  document.getElementById("card-modal").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("card-modal").classList.add("hidden");
}

function updateHeader() {
  document.getElementById("hdr-gold").textContent = fmtNum(save.gold);
}

init();
</script>
</body>
</html>
